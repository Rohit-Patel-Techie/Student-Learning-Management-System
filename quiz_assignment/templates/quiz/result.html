<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student LMS : Quiz Result</title>
</head>

<body>
    <h2>{{ quiz.title }} Result</h2>

    <p>Score: {{ score }}%</p>
    <p>{{ correct }} out of {{ total }} correct</p>

    {% if score == 100 %}
    <p style="color:green;">Excellent 🎉</p>
    {% elif score >= 50 %}
    <p style="color:orange;">Good 👍</p>
    {% else %}
    <p style="color:red;">Try Again ❌</p>
    {% endif %}
</body>

</html>
